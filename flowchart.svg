<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <text x="400" y="40" text-anchor="middle" fill="#F8FAFC" font-size="22" font-weight="bold">Supercell System Flow</text>

  <!-- User -->
  <rect x="330" y="60" width="140" height="50" rx="25" fill="#3B82F6" filter="url(#shadow)"/>
  <text x="400" y="90" text-anchor="middle" fill="#FFF" font-size="14" font-weight="bold">User</text>

  <!-- Arrow down -->
  <line x1="400" y1="110" x2="400" y2="140" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/></marker></defs>

  <!-- Frontend -->
  <rect x="280" y="145" width="240" height="55" rx="10" fill="#1E40AF" filter="url(#shadow)"/>
  <text x="400" y="168" text-anchor="middle" fill="#FFF" font-size="13" font-weight="bold">Frontend</text>
  <text x="400" y="186" text-anchor="middle" fill="#93C5FD" font-size="11">React 19 + Zustand + Tailwind</text>

  <!-- Three branches -->
  <!-- Arrow to Chat -->
  <line x1="320" y1="200" x2="130" y2="250" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Arrow to Agent -->
  <line x1="400" y1="200" x2="400" y2="250" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Arrow to DataLens -->
  <line x1="480" y1="200" x2="670" y2="250" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Chat Module -->
  <rect x="40" y="255" width="180" height="70" rx="10" fill="#059669" filter="url(#shadow)"/>
  <text x="130" y="282" text-anchor="middle" fill="#FFF" font-size="13" font-weight="bold">Chat</text>
  <text x="130" y="300" text-anchor="middle" fill="#A7F3D0" font-size="10">Multi-session</text>
  <text x="130" y="314" text-anchor="middle" fill="#A7F3D0" font-size="10">Streaming Output</text>

  <!-- Agent Module -->
  <rect x="290" y="255" width="220" height="70" rx="10" fill="#7C3AED" filter="url(#shadow)"/>
  <text x="400" y="282" text-anchor="middle" fill="#FFF" font-size="13" font-weight="bold">Agent Team</text>
  <text x="400" y="300" text-anchor="middle" fill="#DDD6FE" font-size="10">Developer + Tester</text>
  <text x="400" y="314" text-anchor="middle" fill="#DDD6FE" font-size="10">Parallel Review</text>

  <!-- DataLens Module -->
  <rect x="580" y="255" width="180" height="70" rx="10" fill="#D97706" filter="url(#shadow)"/>
  <text x="670" y="282" text-anchor="middle" fill="#FFF" font-size="13" font-weight="bold">DataLens</text>
  <text x="670" y="300" text-anchor="middle" fill="#FDE68A" font-size="10">Text-to-SQL</text>
  <text x="670" y="314" text-anchor="middle" fill="#FDE68A" font-size="10">ECharts Viz</text>

  <!-- Arrows down to backend -->
  <line x1="130" y1="325" x2="130" y2="370" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="325" x2="400" y2="370" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="670" y1="325" x2="670" y2="370" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Backend bar -->
  <rect x="40" y="375" width="720" height="55" rx="10" fill="#334155" filter="url(#shadow)"/>
  <text x="400" y="398" text-anchor="middle" fill="#FFF" font-size="13" font-weight="bold">Backend — Express 5</text>
  <text x="400" y="416" text-anchor="middle" fill="#94A3B8" font-size="11">OpenAI SDK | DuckDB | SQLite | node-cron</text>

  <!-- Arrow to LLM -->
  <line x1="400" y1="430" x2="400" y2="455" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- LLM -->
  <rect x="280" y="458" width="240" height="35" rx="17" fill="#BE185D" filter="url(#shadow)"/>
  <text x="400" y="480" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold">LLM Endpoint (OpenAI Compatible)</text>
</svg>
